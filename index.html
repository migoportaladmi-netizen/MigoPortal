<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="MigoPortal - Comprehensive HR, Travel, Payroll & Expense Management Platform" />
  <meta name="keywords"
    content="HR Portal, Recruitment, Applicant Tracking, Payroll, Expense Management, Employee Reviews, Corporate Travel, Time Tracking, Attendance, Surveys" />
  <meta name="author" content="Netizen" />
  <meta property="og:title" content="MigoPortal | HR & Corporate Portal" />
  <meta property="og:description"
    content="Manage recruitment, payroll, attendance, trips, and expenses in one smart platform." />
  <meta property="og:type" content="website" />
  <title>MigoPortal | HR, Recruitment & Payroll Platform</title>

  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="shortcut icon" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">

  <script>
    // Polyfill process to prevent crashes on devices where it might be undefined
    window.process = window.process || { env: {} };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              750: '#2d3748', // Custom dark shade if needed
              850: '#1a202c',
              950: '#020617',
            }
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }

    .dark body {
      background-color: #020617;
    }

    /* Custom scrollbar for sleeker look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading Spinner for root */
    .app-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #f8fafc;
    }

    .dark .app-loader {
      background-color: #020617;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-bottom-color: #4f46e5;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <div class="app-loader">
      <span class="loader-spinner"></span>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
